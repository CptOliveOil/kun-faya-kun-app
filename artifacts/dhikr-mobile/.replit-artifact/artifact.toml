kind = "mobile"
previewPath = "/dhikr-mobile/"
title = "Dhikr & Dua Mobile"
version = "1.0.0"
id = "artifacts/dhikr-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 19277
name = "expo"
paths = ["/dhikr-mobile/"]

[services.development]
run = "pnpm --filter @workspace/dhikr-mobile run dev"

[services.env]
PORT = "19277"
BASE_PATH = "/dhikr-mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dhikr-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/dhikr-mobile", "run", "serve"]
